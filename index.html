  </div>

  <script>
    // CHANGE LAUNCH DATE HERE
    // new Date(YEAR, MONTH-1, DAY, HOUR, MIN, SEC)
    // Example: July 30 2025 = new Date(2025, 6, 30, 0, 0, 0)
    const LAUNCH = new Date(2026, 6, 1, 0, 0, 0); // July 1, 2026

    const ids = ['d','h','m','s'];
    let prev = {};
    function pad(n){ return String(n).padStart(2,'0'); }
    function pop(id){
      const el = document.getElementById(id);
      el.classList.add('pop');
      setTimeout(() => el.classList.remove('pop'), 110);
    }
    function tick(){
      const diff = Math.max(0, LAUNCH - Date.now());
      const vals = {
        d: Math.floor(diff / 864e5),
        h: Math.floor((diff % 864e5) / 36e5),
        m: Math.floor((diff % 36e5) / 6e4),
        s: Math.floor((diff % 6e4) / 1e3)
      };
      ids.forEach(id => {
        if(prev[id] !== vals[id]){ pop(id); document.getElementById(id).textContent = pad(vals[id]); }
      });
      prev = { ...vals };
    }
    tick();
    setInterval(tick, 1000);
  </script>
