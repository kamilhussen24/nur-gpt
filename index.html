<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>নতুন Bal AI আসছে</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #070b18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      font-family: 'Noto Sans Bengali', Arial, sans-serif;
      padding: 24px 12px;
      overflow: hidden;
    }

    /* ── countdown ── */
    .countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 360px;
      gap: 0;
    }

    .box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .num {
      font-family: 'Courier New', monospace;
      font-size: 11vw;
      font-weight: 700;
      color: #00f5d4;
      background: rgba(0,245,212,0.06);
      border: 1px solid rgba(0,245,212,0.2);
      border-radius: 10px;
      width: 20vw;
      max-width: 80px;
      height: 13vw;
      max-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 0 0 14px rgba(0,245,212,0.4);
      transition: transform 0.12s ease;
    }

    .num.pop { transform: scale(1.07); }

    .lbl {
      font-size: 2.2vw;
      max-font-size: 10px;
      letter-spacing: 0.05em;
      color: #4a5568;
      font-size: min(2.8vw, 11px);
    }

    .sep {
      font-family: 'Courier New', monospace;
      font-size: 7vw;
      font-weight: 700;
      color: rgba(0,245,212,0.3);
      margin-bottom: 20px;
      flex-shrink: 0;
      width: 5vw;
      text-align: center;
    }

    /* ── title ── */
    .title {
      text-align: center;
      width: 100%;
      padding: 0 8px;
    }

    .title h1 {
      font-family: 'Noto Sans Bengali', Arial, sans-serif;
      font-size: min(6.5vw, 1.8rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .title h1 span {
      background: linear-gradient(90deg, #00f5d4, #7b5ea7, #ff6b35);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shift 4s linear infinite;
    }

    @keyframes shift { to { background-position: 200%; } }

    .title p {
      margin-top: 8px;
      font-size: min(3.8vw, 0.88rem);
      color: #6b7a99;
      line-height: 1.6;
    }

    /* ── button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 28px;
      background: #229ED9;
      color: #fff;
      font-family: 'Noto Sans Bengali', Arial, sans-serif;
      font-size: min(4vw, 0.95rem);
      font-weight: 700;
      border-radius: 100px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(34,158,217,0.35);
      transition: transform 0.16s, box-shadow 0.16s;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(34,158,217,0.5); }
    .btn:active { transform: scale(0.97); }

    @media (min-width: 480px) {
      .num { width: 80px; max-width: 80px; height: 72px; max-height: 72px; font-size: 2.2rem; }
      .sep { font-size: 2rem; width: 24px; }
      .lbl { font-size: 0.65rem; }
      .title h1 { font-size: 2rem; }
      .title p { font-size: 0.9rem; }
      .btn { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <div class="countdown">
    <div class="box">
      <div class="num" id="d">00</div>
      <div class="lbl">দিন</div>
    </div>
    <div class="sep">:</div>
    <div class="box">
      <div class="num" id="h">00</div>
      <div class="lbl">ঘণ্টা</div>
    </div>
    <div class="sep">:</div>
    <div class="box">
      <div class="num" id="m">00</div>
      <div class="lbl">মিনিট</div>
    </div>
    <div class="sep">:</div>
    <div class="box">
      <div class="num" id="s">00</div>
      <div class="lbl">সেকেন্ড</div>
    </div>
  </div>

  <div class="title">
    <h1>নতুন Bal AI <span>আসছে</span></h1>
    <p>প্রথম আপডেট পেতে Telegram-এ চোখ রাখুন</p>
  </div>

  <a class="btn" href="https://t.me/+DIKkgKBpsDE4ZWI9" target="_blank" rel="noopener">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
      <path d="M21.94 3.26a1.5 1.5 0 0 0-1.63-.35L2.17 10.4a1.5 1.5 0 0 0 .09 2.79l4.17 1.31 1.66 5.2a1.5 1.5 0 0 0 2.45.61l2.27-2.27 4.37 3.21a1.5 1.5 0 0 0 2.34-1.02l2.4-15a1.5 1.5 0 0 0-.98-1.97z" fill="white"/>
    </svg>
    Telegram-এ Join করুন
  </a>

  <script>
    const target = new Date(Date.now() + 30*24*60*60*1000);
    const ids = ['d','h','m','s'];
    let prev = {};
    function pad(n){ return String(n).padStart(2,'0'); }
    function pop(id){
      const el = document.getElementById(id);
      el.classList.add('pop');
      setTimeout(()=>el.classList.remove('pop'), 120);
    }
    function tick(){
      const diff = Math.max(0, target - Date.now());
      const vals = {
        d: Math.floor(diff/864e5),
        h: Math.floor((diff%864e5)/36e5),
        m: Math.floor((diff%36e5)/6e4),
        s: Math.floor((diff%6e4)/1e3)
      };
      ids.forEach(id=>{
        if(prev[id] !== vals[id]){ pop(id); document.getElementById(id).textContent = pad(vals[id]); }
      });
      prev = {...vals};
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
